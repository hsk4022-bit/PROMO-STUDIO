<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMO STUDIO</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;font-family:'Pretendard',sans-serif;background:#0d0e12;color:#e5e7eb;-webkit-font-smoothing:antialiased;}
.app{display:flex;flex-direction:column;height:100vh;width:100vw;}

/* ── 헤더 ── */
.header{display:flex;align-items:center;justify-content:space-between;background:#090a0d;border-bottom:1px solid #1f2128;padding:0 1.5rem;height:3.5rem;flex:0 0 auto;}
.brand{display:flex;align-items:center;gap:0.625rem;font-weight:900;font-size:0.9375rem;letter-spacing:0.02em;}
.brand-dot{width:0.5rem;height:0.5rem;border-radius:50%;background:#3264ff;}
.brand-text{color:#f3f4f6;}
.brand-sub{color:#6b7280;font-weight:500;font-size:0.75rem;margin-left:0.375rem;}
.header-right{display:flex;align-items:center;gap:0.75rem;font-size:0.75rem;color:#6b7280;}
.api-key-box{display:flex;align-items:center;gap:0.3rem;background:#0d0e12;border:1px solid #1f2128;border-radius:0.375rem;padding:0.2rem 0.4rem;transition:border-color 0.2s,box-shadow 0.2s;}
.api-key-box:focus-within{border-color:#3264ff;box-shadow:0 0 0 3px rgba(50,100,255,0.15);}
.api-key-box .label{font-size:0.625rem;font-weight:900;color:#6b7280;letter-spacing:0.05em;text-transform:uppercase;white-space:nowrap;transition:color 0.2s;}
.api-key-box input{background:transparent;border:none;outline:none;color:#f3f4f6;font-family:monospace;font-size:0.75rem;width:6rem;padding:0.25rem 0;}
.api-key-box input::placeholder{color:#4b5563;}
.api-key-box .status-dot{width:0.375rem;height:0.375rem;border-radius:50%;background:#6b7280;flex-shrink:0;transition:background 0.2s,box-shadow 0.2s;}
.api-key-box .status-dot.ok{background:#10b981;box-shadow:0 0 6px rgba(16,185,129,0.6);}
/* 비어있을 때 펄스 — 사용자 주의 유도 */
@keyframes keyPulse{0%,100%{box-shadow:0 0 0 0 rgba(50,100,255,0.5);border-color:#3264ff;}50%{box-shadow:0 0 0 6px rgba(50,100,255,0);border-color:#4e78ff;}}
.api-key-box.empty{animation:keyPulse 1.8s ease-in-out infinite;border-color:#3264ff;}
.api-key-box.empty .label{color:#3264ff;}
.api-key-box.empty .status-dot{background:#3264ff;box-shadow:0 0 6px rgba(50,100,255,0.6);}
.api-key-box.empty:focus-within{animation:none;}
/* Notion Token — 보라 계열 */
.notion-key-box{border-color:#3b1f6e;}
.notion-key-box .label{color:#a78bfa;}
.notion-key-box:focus-within{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,0.2);}
.notion-key-box .status-dot.ok{background:#7c3aed;box-shadow:0 0 6px rgba(124,58,237,0.6);}
@keyframes notionPulse{0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,0.5);border-color:#7c3aed;}50%{box-shadow:0 0 0 6px rgba(124,58,237,0);border-color:#a78bfa;}}
.notion-key-box.empty{animation:notionPulse 1.8s ease-in-out infinite;border-color:#7c3aed;}
.notion-key-box.empty .label{color:#7c3aed;}
.notion-key-box.empty .status-dot{background:#7c3aed;box-shadow:0 0 6px rgba(124,58,237,0.6);}
.notion-key-box.empty:focus-within{animation:none;}

/* ── 탭 바 ── */
.tabs{display:flex;background:#090a0d;border-bottom:1px solid #1f2128;flex:0 0 auto;height:3rem;padding:0 1rem;gap:0.25rem;align-items:flex-end;}
.tab{position:relative;display:inline-flex;align-items:center;gap:0.5rem;padding:0 1rem;height:2.5rem;font-size:0.8125rem;font-weight:700;color:#6b7280;background:transparent;border:none;cursor:pointer;border-top-left-radius:0.5rem;border-top-right-radius:0.5rem;transition:color 0.15s,background 0.15s;font-family:inherit;letter-spacing:0.01em;text-decoration:none;}
.tab:hover{color:#d1d5db;background:rgba(255,255,255,0.03);}
.tab.active{color:#f3f4f6;background:#0d0e12;}
.tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:#3264ff;border-radius:1px;}
.tab-emoji{font-size:0.9375rem;line-height:1;}
.tab-label{font-size:0.8125rem;}
.tab-meta{display:none;font-size:0.6875rem;color:#6b7280;font-weight:500;margin-left:0.25rem;}
@media (min-width:1024px){.tab-meta{display:inline;}}

/* ── 툴팁 (탭 hover 시 상세 설명) ── */
.tab[data-tooltip]::before{content:attr(data-tooltip);position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(-4px);background:#1f2128;color:#f3f4f6;padding:0.5rem 0.75rem;border-radius:0.375rem;white-space:nowrap;font-size:0.6875rem;font-weight:500;letter-spacing:0;line-height:1.4;z-index:100;box-shadow:0 6px 18px rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:opacity 0.18s,transform 0.18s;border:1px solid #2d2f36;}
.tab[data-tooltip]:hover::before{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── 메인 영역 (iframe 컨테이너) ── */
.main{flex:1 1 auto;position:relative;background:#0d0e12;overflow:hidden;}
.frame{position:absolute;inset:0;width:100%;height:100%;border:none;background:#0d0e12;display:none;}
.frame.active{display:block;}
.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#6b7280;font-size:0.875rem;pointer-events:none;}

</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-text">PROMO STUDIO</span>
      <span class="brand-sub">v1.0</span>
    </div>
    <div class="header-right">
      <label class="api-key-box" for="gemini-key">
        <span class="key-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2l-9.6 9.6"/><path d="M15.5 7.5l3 3L22 7l-3-3"/></svg></span>
        <span class="label">GEMINI API KEY</span>
        <input type="password" id="gemini-key" placeholder="sk-..." autocomplete="new-password" spellcheck="false">
        <span class="status-dot" id="key-status"></span>
      </label>
      <!-- [Notion Token — 비활성화]
      <label class="api-key-box notion-key-box" for="notion-token" style="margin-left:8px;">
        <span class="key-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2l-9.6 9.6"/><path d="M15.5 7.5l3 3L22 7l-3-3"/></svg></span>
        <span class="label">NOTION TOKEN</span>
        <input type="password" id="notion-token" placeholder="secret_xxxx..." autocomplete="off" spellcheck="false">
        <span class="status-dot" id="notion-key-status"></span>
      </label>
      [/Notion Token] -->
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <a class="tab active" role="tab" href="#post" data-target="post" aria-selected="true"
       data-tooltip="노션 기획서 기반 프로모션 HTML 편집">
      <span class="tab-emoji">📝</span>
      <span class="tab-label">게시물</span>
      <span class="tab-meta">PROMO EDITOR</span>
    </a>
    <a class="tab" role="tab" href="#new-banner" data-target="new-banner" aria-selected="false"
       data-tooltip="신규로 배너를 생성하고 다양한 사이즈로 리사이징">
      <span class="tab-emoji">🎨</span>
      <span class="tab-label">신규 배너</span>
      <span class="tab-meta">1배너 → 리사이즈</span>
    </a>
    <a class="tab" role="tab" href="#multi-size" data-target="multi-size" aria-selected="false"
       data-tooltip="2번 탭에서 생성한 다양한 사이즈 배너를 가이드로 활용하여 다국어 배너 제작">
      <span class="tab-emoji">📐</span>
      <span class="tab-label">다규격 배너</span>
      <span class="tab-meta">기존 배너 → 다언어/다규격</span>
    </a>
    <a class="tab" role="tab" href="#multi-lang" data-target="multi-lang" aria-selected="false"
       data-tooltip="여러 배너를 여러 언어로 번역">
      <span class="tab-emoji">🌐</span>
      <span class="tab-label">다국어 배너</span>
      <span class="tab-meta">기존 여러 배너 → 여러 언어</span>
    </a>
  </nav>

  <main class="main">
    <iframe class="frame active" id="frame-post"       data-src="./promo-editor/index.html"     title="게시물"></iframe>
    <iframe class="frame"        id="frame-new-banner" data-src="./banner-studio/index.html"    title="신규 배너"></iframe>
    <iframe class="frame"        id="frame-multi-size" data-src="./banner-l/index.html#lock-resize"    title="다규격 배너"></iframe>
    <iframe class="frame"        id="frame-multi-lang" data-src="./banner-l/index.html#lock-translate" title="다국어 배너"></iframe>
  </main>

</div>

<script>
(function(){
  // ── API KEY 통합 관리 ──
  const STORAGE_KEY = 'promo_studio_gemini_api_key';
  const keyInput = document.getElementById('gemini-key');
  const keyStatus = document.getElementById('key-status');
  const keyBox = keyInput.closest('.api-key-box');

  function updateEmptyState(){
    const isEmpty = !(keyInput.value && keyInput.value.trim());
    keyBox.classList.toggle('empty', isEmpty);
    keyStatus.classList.toggle('ok', !isEmpty);
  }

  function broadcastKey(value){
    try { localStorage.setItem(STORAGE_KEY, value || ''); } catch(e){}
    document.querySelectorAll('iframe.frame').forEach(f => {
      try { f.contentWindow && f.contentWindow.postMessage({type:'PROMO_STUDIO_API_KEY', key: value || ''}, '*'); } catch(e){}
    });
    updateEmptyState();
  }

  // 초기값 로드
  try {
    const saved = localStorage.getItem(STORAGE_KEY) || '';
    if (saved) keyInput.value = saved;
  } catch(e){}
  updateEmptyState();

  // 비어있으면 페이지 진입 시 포커스 유도
  if (keyBox.classList.contains('empty')) {
    setTimeout(() => keyInput.focus({ preventScroll: true }), 150);
  }

  keyInput.addEventListener('input', e => broadcastKey(e.target.value));
  keyInput.addEventListener('blur', updateEmptyState);


  // iframe 로드 완료 후 현재 키 재전송 (초기 동기화)
  function syncKeyToFrame(frame){
    try { frame.contentWindow && frame.contentWindow.postMessage({type:'PROMO_STUDIO_API_KEY', key: keyInput.value || ''}, '*'); } catch(e){}
  }

  const tabs = document.querySelectorAll('.tab');
  const frames = document.querySelectorAll('.frame');
  const loaded = new Set();

  // 각 iframe load 이벤트 시 키 동기화
  frames.forEach(f => f.addEventListener('load', () => syncKeyToFrame(f)));

  const TARGETS = ['post', 'new-banner', 'multi-size', 'multi-lang'];

  // 첫 탭은 즉시 로드
  loadFrame('frame-post');

  function loadFrame(id){
    if(loaded.has(id)) return;
    const f = document.getElementById(id);
    if(!f) return;
    f.src = f.dataset.src;
    loaded.add(id);
  }

  function activate(target){
    tabs.forEach(t => {
      const isActive = t.dataset.target === target;
      t.classList.toggle('active', isActive);
      t.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
    frames.forEach(f => {
      const isActive = f.id === 'frame-' + target;
      f.classList.toggle('active', isActive);
      if(isActive) loadFrame(f.id);
    });
    try { history.replaceState(null, '', '#' + target); } catch(e) {}
  }

  tabs.forEach(t => t.addEventListener('click', e => {
    e.preventDefault();        // href 기본 동작 차단 (스크롤 점프 방지)
    activate(t.dataset.target);
  }));

  // URL hash 로 직접 진입 가능 (#post #new-banner #multi-size #multi-lang)
  const initial = (location.hash || '').replace('#','');
  if(TARGETS.includes(initial)) activate(initial);

  // 뒤로/앞으로 네비게이션 대응
  window.addEventListener('hashchange', () => {
    const h = (location.hash || '').replace('#','');
    if(TARGETS.includes(h)) activate(h);
  });

  // 키보드 단축키 1-4
  document.addEventListener('keydown', e => {
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const idx = parseInt(e.key, 10) - 1;
    if(idx >= 0 && idx < TARGETS.length) activate(TARGETS[idx]);
  });
})();
</script>
</body>
</html>
