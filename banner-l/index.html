const FIXED_LOGO_SCALES = {
  "640x100": 60, "728x90": 45, "970x90": 50, "300x50": 65, "300x60": 70, "320x50": 75, "320x100": 85, "900x150": 70, "970x250": 55, "500x500": 80, "1080x1080": 70, "300x250": 85, "480x320": 75, "800x400": 60, "1024x768": 60, "1200x628": 55, "1200x800": 55, "1280x720": 50, "1920x1080": 60, "320x480": 110, "300x600": 110, "375x667": 110, "640x960": 90, "768x1024": 80, "800x1200": 80, "720x1280": 85, "1203x1500": 85, "1080x1920": 85
};

const FIXED_LOGO_PADDINGS = {
  "1024x1024": 32, "640x100": 12, "728x90": 12, "970x90": 12, "300x50": 8, "300x60": 8, "320x50": 8, "320x100": 8, "900x150": 12, "970x250": 12, "500x500": 24, "1080x1080": 32, "300x250": 12, "480x320": 12, "800x400": 24, "1024x768": 24, "1200x628": 24, "1200x800": 24, "1280x720": 24, "1920x1080": 24, "320x480": 12, "300x600": 12, "375x667": 24, "640x960": 24, "768x1024": 24, "800x1200": 32, "720x1280": 32, "1203x1500": 32, "1080x1920": 32
};

const processImageMetadata = (file) => {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (e) => {
      const src = e.target.result;
      const img = new Image();
      img.src = src;
      img.onload = () => resolve({ id: `src-${Date.now()}-${Math.random().toString(36).substr(2, 5)}`, src, w: img.width, h: img.height, name: file.name });
      img.onerror = () => resolve(null);
    };
  });
};

const urlToBase64 = (url) => {
  return new Promise((resolve) => {
    if (!url || !url.startsWith('http') || url.includes('...')) return resolve(null);
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = img.width; canvas.height = img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);
      resolve(canvas.toDataURL("image/png"));
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });
};

const stripBase64Params = (base64) => base64?.split('base64,')[1] || '';

const finalizeBannerPixel = (base64, targetW, targetH, logoBase64, scaleModifier = 100, position = 'tl') => {
  return new Promise((resolve) => {
    if (!base64) return resolve(null);
    const img = new Image();
    img.src = base64;
    img.onload = async () => {
        const canvas = document.createElement('canvas');
        canvas.width = targetW; canvas.height = targetH;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, targetW, targetH);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, targetW, targetH);
        if (logoBase64) {
          try {
            const logoImg = await new Promise((res, rej) => {
                const lImg = new Image(); lImg.src = logoBase64;
                lImg.onload = () => res(lImg); lImg.onerror = rej;
            });
            const key = `${targetW}x${targetH}`;
            const padding = FIXED_LOGO_PADDINGS[key] || 12;
            let baseLogoH = targetH * 0.22; let baseLogoW = targetW * 0.28;
            if (targetH <= 100) baseLogoH = targetH * 0.48;
            let maxLogoH = baseLogoH * (scaleModifier / 100);
            let maxLogoW = baseLogoW * (scaleModifier / 100);
            maxLogoH = Math.min(maxLogoH, targetH - (padding * 2));
            maxLogoW = Math.min(maxLogoW, targetW - (padding * 2));
            const fitScale = Math.min(maxLogoW / logoImg.width, maxLogoH / logoImg.height);
            const finalW = logoImg.width * fitScale; const finalH = logoImg.height * fitScale;
            let lx, ly;
            switch(position) {
              case 'tr': lx = targetW - finalW - padding; ly = padding; break;
              case 'bl': lx = padding; ly = targetH - finalH - padding; break;
              case 'br': lx = targetW - finalW - padding; ly = targetH - finalH - padding; break;
              case 'tl': default: lx = padding; ly = padding; break;
            }
            ctx.drawImage(logoImg, lx, ly, finalW, finalH);
          } catch(e) { console.error("Logo drawing error", e); }
        }
        resolve(canvas.toDataURL('image/jpeg', 0.95));
    };
    img.onerror = () => resolve(null);
  });
};

const CompactSingleUploader = ({ label, image, onUpload, onDelete, icon: Icon = PlusSquare, height = "h-12" }) => {
    const fileInputRef = useRef(null);
    const [isDragging, setIsDragging] = useState(false);
    return (
      <div className="flex flex-col gap-1 w-full text-left">
        {label && <div className="flex justify-between items-center px-1"><span className="text-[9px] text-slate-400 font-normal uppercase tracking-widest flex items-center gap-1.5"><Icon className="w-3.5 h-3.5" /> <span>{label}</span></span></div>}
        <div
          onClick={() => fileInputRef.current?.click()}
          onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
          onDragLeave={(e) => { if (!e.currentTarget.contains(e.relatedTarget)) { setIsDragging(false); } }}
          onDrop={async (e) => { e.preventDefault(); setIsDragging(false); const f = e.dataTransfer.files?.[0]; if(f && f.type.startsWith('image/')) { const meta = await processImageMetadata(f); if(meta) onUpload(meta.src); } }}
          className={`relative group ${height} w-full rounded border border-dashed transition-all flex items-center justify-center overflow-hidden ${isDragging ? 'bg-[#3264ff]/20 border-[#3264ff]' : 'bg-black/40 border-[#2d2f36]'} hover:border-[#3264ff]/50 cursor-pointer ${image ? 'border-solid' : ''}`}
        >
          {image ? (
            <>
              <img src={image} alt="upload" className="w-full h-full object-contain p-1" />
              <div className="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all"><button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="text-red-400 p-2 hover:scale-110 transition-transform"><Trash2 className="w-4 h-4" /></button></div>
            </>
          ) : (
            <div className="flex flex-col items-center gap-1 opacity-20 text-slate-400 text-center">
              <UploadCloud className="w-4 h-4" />
              <span className="text-[7px] font-normal uppercase tracking-widest">UPLOAD</span>
            </div>
          )}
          <input type="file" ref={fileInputRef} onChange={async (e) => { const file = e.target.files?.[0]; if (file) { const m = await processImageMetadata(file); if(m) onUpload(m.src); } }} accept="image/*" className="hidden" />
        </div>
      </div>
    );
};

  const [languages, setLanguages] = useState([

  const _lockedMode = _initialHash.startsWith('lock-');
  const [activeTab, setActiveTab] = useState(_initialMode);

  const [isDraggingTBoard, setIsDraggingTBoard] = useState(false);
  const [isDraggingTCsv, setIsDraggingTCsv] = useState(false);
  const tBoardInputRef = useRef(null);

  useEffect(() => {
    const preventDefault = (e) => { e.preventDefault(); e.stopPropagation(); };
    window.addEventListener('dragover', preventDefault);
    window.addEventListener('drop', preventDefault);
    return () => { window.removeEventListener('dragover', preventDefault); window.removeEventListener('drop', preventDefault); };
  }, []);

  // PROMO STUDIO API KEY 동기화 (iframe 부모에서 postMessage 로 전달)
  useEffect(() => {
    const onMsg = (ev) => {
      const d = ev.data || {};
      if (d.type === 'PROMO_STUDIO_API_KEY' && typeof d.key === 'string') {
        setUserApiKey(d.key);
      }
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // config.json 자동 로드
  useEffect(() => {
    (async () => {
      try {
        const resp = await fetch('/config.json?' + Date.now());
        if (!resp.ok) return;
        const cfg = await resp.json();

        // API 키
        if (cfg.apiKey) setUserApiKey(cfg.apiKey);

        // 모드
        if (cfg.mode) setActiveTab(cfg.mode);

        if (cfg.mode === 'translate') {
          // TRANSLATE 모드: 배너 이미지 로드
          if (cfg.banners && cfg.banners.length > 0) {
            const metas = await Promise.all(cfg.banners.map(async (b) => {
              try {
                const r = await fetch(b.url);
                const blob = await r.blob();
                const src = await new Promise(res => { const reader = new FileReader(); reader.onload = e => res(e.target.result); reader.readAsDataURL(blob); });
                const img = await new Promise(res => { const i = new Image(); i.onload = () => res(i); i.src = src; });
                return { id: `src-${Date.now()}-${Math.random().toString(36).substr(2,5)}`, src, w: img.width, h: img.height, name: b.filename };
              } catch(e) { return null; }
            }));
            setTBanners(metas.filter(m => m));
          }

          // CSV 데이터 로드
          if (cfg.csvData && cfg.csvData.length > 0) {
            const rows = await Promise.all(cfg.csvData.map(async (row) => {
              let logo_base64 = null;
              if (row.logo_url && row.logo_url.startsWith('http') && !row.logo_url.includes('...')) {
                try { logo_base64 = await urlToBase64(row.logo_url); } catch(e) {}
              }
              return { filename: row.filename || '', suffix: row.suffix || '', original_text: row.original_text || '', main_title: row.title || '', subtitle: row.sub_text || '', sub_sub_text: row.sub_sub_text || '', button_text: row.btn_text || '', filename_suffix: row.file_suffix || '', logo: logo_base64, extra_instructions: row.extra || '', position: row.position || 'tl', scale: row.scale || 100 };
            }));
            setTCsvData(rows);
            setLastSyncTime(new Date().toLocaleTimeString());
          }
        } else {
          // RESIZE 모드: 기존 로직
          if (cfg.originalText) setGlobalOriginalText(cfg.originalText);
          if (cfg.banners && cfg.banners.length > 0) {
            const metas = await Promise.all(cfg.banners.map(async (b) => {
              try {
                const r = await fetch(b.url);
                const blob = await r.blob();
                const src = await new Promise(res => { const reader = new FileReader(); reader.onload = e => res(e.target.result); reader.readAsDataURL(blob); });
                const img = await new Promise(res => { const i = new Image(); i.onload = () => res(i); i.src = src; });
                return { id: `src-${Date.now()}-${Math.random().toString(36).substr(2,5)}`, src, w: img.width, h: img.height, name: b.filename };
              } catch(e) { return null; }
            }));
            const validMetas = metas.filter(m => m);
            setSourceBanners(validMetas);
            if (validMetas.length > 0) {
              const master = validMetas.find(m => m.w === 1024 && m.h === 1024) || validMetas.sort((a,b) => (b.w*b.h)-(a.w*a.h))[0];
              setMasterBannerId(master.id);
              setStyleReference(master.src);
            }
          }
          if (cfg.languages) {
            const langs = await Promise.all(cfg.languages.map(async (l, i) => {
              let logo_base64 = null;
              if (l.logo_url && l.logo_url.startsWith('http') && !l.logo_url.includes('...')) {
                try { logo_base64 = await urlToBase64(l.logo_url); } catch(e) {}
              }
              return { id: `lang-${l.suffix || Date.now() + i}`, suffix: l.suffix || '', original_text: l.original_text || '', main_title: l.title || '', subtitle: l.sub_text || '', sub_sub_text: l.sub_sub_text || '', button_text: l.btn_text || '', filename_suffix: l.file_suffix || '', logo: logo_base64, position: l.position || 'tl', scale: l.scale || 100, extra_instructions: l.extra || '', master_style_image: null };
            }));
            setLanguages(langs);
            const firstOrig = langs.find(l => l.original_text)?.original_text;
            if (firstOrig) setGlobalOriginalText(firstOrig);
            setLastSyncTime(new Date().toLocaleTimeString());
          }
        }
        console.log('[CONFIG] 자동 로드 완료:', cfg.mode || 'resize');
      } catch(e) { /* config.json 없으면 무시 */ }
    })();
  }, []);

  const updateLangField = (id, field, val) => { setLanguages(prev => prev.map(l => l.id === id ? { ...l, [field]: val } : l)); };
  const addLanguage = () => { const newId = `lang-${Date.now()}`; setLanguages(prev => [...prev, { id: newId, suffix: '', main_title: '', subtitle: '', sub_sub_text: '', button_text: '', filename_suffix: '', logo: null, position: 'tl', scale: 100, extra_instructions: '', master_style_image: null }]); };
  const removeLanguage = (id) => { if (languages.length > 1) setLanguages(prev => prev.filter(l => l.id !== id)); };

  const handleSourceBannersUpload = async (files) => {
    const validFiles = files.filter(f => f.type.startsWith('image/'));
    const metas = await Promise.all(validFiles.map(f => processImageMetadata(f)));
    setSourceBanners(prev => {
        const newBanners = [...prev, ...metas];
        if (!masterBannerId && newBanners.length > 0) {
            const master = newBanners.find(m => m.w === 1024 && m.h === 1024) || [...newBanners].sort((a,b) => (b.w*b.h) - (a.w*a.h))[0];
            setMasterBannerId(master.id);
            if (!styleReference) setStyleReference(master.src);
        }
        return newBanners;
    });
  };

  const parseCsvText = async (text) => {
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length <= 1) return;
    const splitLine = (line) => line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(p => p.replace(/^"|"$/g, '').trim());
    const normalize = (s) => s.toLowerCase().replace(/[()[\]{}]/g, '').replace(/\s+/g, '_').replace(/^_+|_+$/g, '');
    const header = splitLine(lines[0]).map(normalize);
    const aliasMap = {
      no:            ['no', '번호', 'number', 'num'],
      suffix:        ['suffix', 'lang', 'language', 'lang_code', '언어', '접미사'],
      original_text: ['original_text', 'original', 'erase_text', 'target_text', 'source_text', '원문', '지울텍스트', '지울_텍스트'],
      main_title:    ['title', 'main_title', 'maintitle', '타이틀', '제목'],
      subtitle:      ['sub_text', 'subtitle', 'sub', '서브', '서브텍스트', '서브_텍스트'],
      sub_sub_text:  ['sub_sub_text', 'sub2', '서브서브', '서브2'],
      button_text:   ['btn_text', 'button', 'button_text', 'btn', '버튼', '버튼텍스트'],
      filename_suffix: ['file_suffix', 'filename_suffix', 'file_sfx', 'output_suffix', '파일접미사', '파일_접미사'],
      logo_url:      ['logo', 'logo_url', '로고', '로고url'],
      extra:         ['extra', 'extra_instructions', 'instructions', 'notes', '추가', '추가지시', '비고']
    };
    const idx = {};
    Object.keys(aliasMap).forEach(key => {
      idx[key] = header.findIndex(h => aliasMap[key].includes(h));
    });
    const get = (c, key) => (idx[key] >= 0 ? (c[idx[key]] || '') : '');
    const hasNoCol = idx['no'] >= 0;
    const allDataLines = lines.slice(1);
    const allRows = await Promise.all(allDataLines.map(async (line, i) => {
      const c = splitLine(line);
      const no = hasNoCol ? get(c, 'no').trim() : null;
      const suffix = get(c, 'suffix');
      const logo_url = get(c, 'logo_url');
      const logo_base64 = (logo_url && logo_url.startsWith('http') && !logo_url.includes('...')) ? await urlToBase64(logo_url) : null;
      return {
        no, id: `lang-${suffix || Date.now() + i}`, suffix,
        original_text: get(c, 'original_text'),
        main_title: get(c, 'main_title'),
        subtitle: get(c, 'subtitle'),
        sub_sub_text: get(c, 'sub_sub_text'),
        button_text: get(c, 'button_text'),
        filename_suffix: get(c, 'filename_suffix'),
        logo: logo_base64 || languages[0]?.logo || null,
        position: 'tl', scale: 100,
        extra_instructions: get(c, 'extra'),
        master_style_image: languages[0]?.master_style_image || null
      };
    }));

    if (hasNoCol) {
      setCsvAllRows(allRows);
      const nos = [...new Set(allRows.map(r => r.no).filter(Boolean))];
      setCsvSetNos(nos);
      if (nos.length > 0) {
        setActiveSetNo(nos[0]);
        applySetNo(allRows, nos[0]);
      }
      setLastSyncTime(new Date().toLocaleTimeString());
    } else {
      setCsvAllRows([]); setCsvSetNos([]); setActiveSetNo(null);
      const startIndex = Math.max(0, loadRange.start - 1);
      const endIndex = Math.min(allRows.length, loadRange.end);
      const filtered = allRows.slice(startIndex, endIndex);
      if (filtered.length > 0) {
        setLanguages(filtered);
        const firstOrig = filtered.find(l => l.original_text)?.original_text;
        if (firstOrig) setGlobalOriginalText(firstOrig);
        setLastSyncTime(new Date().toLocaleTimeString());
      }
    }
  };

  const applySetNo = (rows, no) => {
    const filtered = rows.filter(r => r.no === no);
    if (filtered.length > 0) {
      setLanguages(filtered);
      setActiveSetNo(no);
      const firstOrig = filtered.find(l => l.original_text)?.original_text;
      if (firstOrig) setGlobalOriginalText(firstOrig);
    }

  const handleSheetFetch = async () => {
    if (!sheetUrl.trim()) return;
    setIsFetchingSheet(true); setError(null);
    try {
      let fetchUrl = sheetUrl.trim();
      if (fetchUrl.includes('docs.google.com/spreadsheets')) {
        const matches = fetchUrl.match(/\/d\/(.+?)\//);
        if (matches && matches[1]) { const sheetId = matches[1]; let gid = fetchUrl.match(/gid=(\d+)/)?.[1] || '0'; fetchUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`; }
      }
      const response = await fetch(fetchUrl);
      if (!response.ok) throw new Error("시트 연결 실패. 권한을 확인하세요.");
      const text = await response.text();
      await parseCsvText(text);
    } catch (e) { setError(e.message); } finally { setIsFetchingSheet(false); }
  };

  // TRANSLATE 모드용 시트 로드 (parseTCsvText 로 연결)
  const handleSheetFetchT = async () => {
    if (!sheetUrl.trim()) return;
    setIsFetchingSheet(true); setError(null);
    try {
      let fetchUrl = sheetUrl.trim();
      if (fetchUrl.includes('docs.google.com/spreadsheets')) {
        const matches = fetchUrl.match(/\/d\/(.+?)\//);
        if (matches && matches[1]) { const sheetId = matches[1]; let gid = fetchUrl.match(/gid=(\d+)/)?.[1] || '0'; fetchUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`; }
      }
      const response = await fetch(fetchUrl);
      if (!response.ok) throw new Error("시트 연결 실패. 권한을 확인하세요.");
      const text = await response.text();
      await parseTCsvText(text);
    } catch (e) { setError(e.message); } finally { setIsFetchingSheet(false); }
  };

  const callGeminiAPI = async (prompt, images) => {
    const activeKey = userApiKey.trim() || apiKeyDefault;
    if (!activeKey) throw new Error("상단 GEMINI API KEY에 키를 먼저 입력해주세요.");
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${API_MODEL}:generateContent?key=${activeKey}`;
    const parts = [{ text: prompt }];
    images.filter(img => img).forEach(img => parts.push({ inlineData: { mimeType: "image/jpeg", data: stripBase64Params(img) } }));
    const payload = { contents: [{ parts }], generationConfig: { responseModalities: ["IMAGE"] } };
    const retryDelays = [2000, 4000, 8000, 15000];
    for (let i = 0; i <= retryDelays.length; i++) {
        try {
            const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (resp.ok) {
                const data = await resp.json();
                const part = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                if (part) return `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`;
                const finishReason = data.candidates?.[0]?.finishReason;
                if (finishReason === 'SAFETY') { throw new Error("안전 필터(Safety)에 의해 이미지가 차단되었습니다."); }
                throw new Error(`이미지 데이터가 반환되지 않았습니다 (사유: ${finishReason || 'Unknown'})`);
            } else {
                const err = await resp.json(); const errMsg = err.error?.message || "";
                const isRetryable = resp.status === 429 || resp.status >= 500 || errMsg.includes('MALFORMED_FUNCTION_CALL');
                if (isRetryable && i < retryDelays.length) { console.warn(`[API 에러 복구 중] ${resp.status} - ${errMsg}. ${retryDelays[i]}ms 대기 후 재요청합니다...`); await new Promise(r => setTimeout(r, retryDelays[i])); continue; }
                throw new Error(`API 오류 (${resp.status}): ${errMsg || "알 수 없는 오류"}`);
            }
        } catch (e) { if (i === retryDelays.length) throw e; }
    }
  };

  const generateSingleResult = async (banner, lang, customPrompt = "") => {
    if (!banner || !lang) return;
    const isMaster = banner.id === masterBannerId;
    const currentStyleRef = isMaster ? styleReference : (lang.master_style_image || styleReference);
    const hasStyleRef = !!currentStyleRef;
    setResults(prev => ({ ...prev, [banner.id]: { ...(prev[banner.id] || {}), [lang.id]: { url: null, rawUrl: null, loading: true, error: null } } }));
    try {
        const promptImages = [banner.src];
        let imgIdx = 1;
        let refInputsStr = `- Image 1 (REF_1): Original Banner (Layout Guide)\n`;
        let styleRefStr = "";
        if (hasStyleRef) { promptImages.push(currentStyleRef); imgIdx++; refInputsStr += `- Image ${imgIdx} (REF_2): Style Reference / Typography Master\n`; styleRefStr = `Image ${imgIdx} (REF_2)`; }
        let eraseLogoStr = "";
        if (globalLogoToErase) { promptImages.push(globalLogoToErase); imgIdx++; refInputsStr += `- Image ${imgIdx} (REF_ERASE): TARGET LOGO/GRAPHIC TO ERASE\n`; eraseLogoStr = `Image ${imgIdx} (REF_ERASE)`; }
        promptImages.push(...textureAssets);

        const guidelinesTemplate = await loadGuidelines();
        const eraseLogoLine = globalLogoToErase ? `3. SPECIFIC GRAPHIC TO ERASE: You MUST find the exact graphic/logo shown in ${eraseLogoStr} within Image 1 and perfectly erase it!` : '';
        const styleRule = hasStyleRef ? (isMaster
          ? `2. VISUAL STYLE = ${styleRefStr}: You MUST strictly apply the high-resolution texture, color grade, and visual mood of ${styleRefStr}.`
          : `2. RESIZE ADAPTATION RULE:
   - ${styleRefStr} is the MASTER RESULT (different aspect ratio: ${sourceBanners.find(b=>b.id===masterBannerId)?.w||1024}x${sourceBanners.find(b=>b.id===masterBannerId)?.h||1024}).
   - REF_1 is the TARGET LAYOUT (${banner.w}x${banner.h}).
   - You MUST use REF_1's EXACT aspect ratio (${banner.w}:${banner.h}), character positions, and spatial composition.
   - Copy ONLY the typography style (font, text effects, colors, glow, shadow) from ${styleRefStr}.
   - DO NOT copy ${styleRefStr}'s layout or character positions — those come from REF_1.
   - The output canvas size MUST match REF_1's dimensions exactly.`) : '';
        const extraTextLine = lang.sub_sub_text ? `- Extra text: "${lang.sub_sub_text}"` : '';
        const buttonLine = lang.button_text ? `- Button: Draw a button with text "${lang.button_text}" exactly where it was.` : `- NO BUTTON: Erase existing buttons completely.`;
        const crucialLine = !isMaster ? `CRUCIAL: Output MUST be ${banner.w}x${banner.h} pixels. Layout/composition from REF_1 ONLY. Typography style from ${styleRefStr} ONLY. Do NOT squash or stretch.` : '';
        const manualReprompt = customPrompt ? `\n[MANUAL RE-PROMPT]: ${customPrompt}` : '';
        const targetTextBlock = globalOriginalText ? `[TARGET TEXT TO REPLACE]\n- Original Text in REF_1 to erase: "${globalOriginalText}"\n(CRITICAL INSTRUCTION: Scan REF_1 to find this exact original text. Erase it completely, and put the new translated text in that exact location.)` : '';

        const prompt = guidelinesTemplate
          .replace('{{REF_INPUTS}}', refInputsStr)
          .replace('{{ORIGINAL_TEXT}}', globalOriginalText || 'ALL EXISTING TEXT AND LETTERS')
          .replace('{{ERASE_LOGO_LINE}}', eraseLogoLine)
          .replace('{{STYLE_RULE}}', styleRule)
          .replace('{{MAIN_TITLE}}', lang.main_title)
          .replace('{{SUBTITLE}}', lang.subtitle)
          .replace('{{EXTRA_TEXT_LINE}}', extraTextLine)
          .replace('{{BUTTON_LINE}}', buttonLine)
          .replace('{{EXTRA_INSTRUCTIONS}}', lang.extra_instructions || 'Maintain strict design consistency.')
          .replace('{{CRUCIAL_LINE}}', crucialLine)
          .replace('{{MANUAL_REPROMPT}}', manualReprompt)
          .replace('{{TARGET_TEXT_BLOCK}}', targetTextBlock);

        const rawUrl = await callGeminiAPI(prompt, promptImages);
        const key = `${banner.w}x${banner.h}`;
        const initScale = FIXED_LOGO_SCALES[key] || 100;
        const finalUrl = await finalizeBannerPixel(rawUrl, banner.w, banner.h, lang.logo, initScale, lang.position);
        setResults(prev => ({ ...prev, [banner.id]: { ...prev[banner.id], [lang.id]: { url: finalUrl, rawUrl: rawUrl, scale: initScale, prompt: customPrompt, loading: false } } }));
        if (isMaster && rawUrl) { setLanguages(prev => prev.map(l => l.id === lang.id ? { ...l, master_style_image: rawUrl } : l)); }
    } catch (e) {
        console.error(`[${lang.id}] 렌더링 실패 상세 에러:`, e);
        setResults(prev => ({ ...prev, [banner.id]: { ...prev[banner.id], [lang.id]: { error: e.message, loading: false } } }));
    }
  };

  const runInBatches = async (tasks, batchSize = 3) => {
    for (let i = 0; i < tasks.length; i += batchSize) {
        const chunk = tasks.slice(i, i + batchSize);
        await Promise.all(chunk.map(async (task, idx) => { if (idx > 0) { await new Promise(r => setTimeout(r, idx * 2500)); } return task(); }));
        if (i + batchSize < tasks.length) { await new Promise(r => setTimeout(r, 2000)); }
    }
  };

  const generateMastersOnly = async () => {

  // ── TRANSLATE 모드 함수 ──
  const handleTBannersUpload = async (files) => {

  // CSV: 파일명, 언어, 지울원문, 타이틀, 서브타이틀, 추가문구, 버튼, 파일접미사, 로고URL, 추가지시
  const parseTCsvText = async (text) => {
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length <= 1) return;
    const splitLine = (line) => line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(p => p.replace(/^"|"$/g, '').trim());
    // 헤더 정규화: 소문자 + 공백/괄호/특수문자 제거
    const normalize = (s) => s.toLowerCase().replace(/[()[\]{}]/g, '').replace(/\s+/g, '_').replace(/^_+|_+$/g, '');
    const header = splitLine(lines[0]).map(normalize);
    // 컬럼 이름 → 인덱스 매핑 (한/영 별칭 포함)
    const aliasMap = {
      filename: ['filename', 'file', 'file_name', 'name', '파일명', '파일', '이름'],
      suffix: ['suffix', 'lang', 'language', 'lang_code', '언어', '접미사'],
      original_text: ['original_text', 'original', 'erase_text', 'target_text', 'source_text', '원문', '원문_지울_텍스트', '지울텍스트', '지울_텍스트'],
      main_title: ['title', 'main_title', 'maintitle', '타이틀', '제목'],
      subtitle: ['sub_text', 'subtitle', 'sub', '서브', '서브텍스트', '서브_텍스트'],
      sub_sub_text: ['sub_sub_text', 'sub2', 'extra_text', '서브서브', '서브2'],
      button_text: ['btn_text', 'button', 'button_text', 'btn', '버튼', '버튼텍스트'],
      filename_suffix: ['file_suffix', 'filename_suffix', 'file_sfx', 'output_suffix', '파일접미사', '파일_접미사'],
      logo_url: ['logo', 'logo_url', '로고', '로고url'],
      extra: ['extra', 'extra_instructions', 'instructions', 'notes', '추가', '추가지시', '비고']
    };
    const idx = {};
    Object.keys(aliasMap).forEach(key => {
      idx[key] = header.findIndex(h => aliasMap[key].includes(h));
    });
    const get = (c, key) => (idx[key] >= 0 ? (c[idx[key]] || '') : '');
    const dataLines = lines.slice(1);
    const rows = await Promise.all(dataLines.map(async (line) => {
      const c = splitLine(line);
      const logo_url = get(c, 'logo_url');
      const logo_base64 = (logo_url && logo_url.startsWith('http') && !logo_url.includes('...')) ? await urlToBase64(logo_url) : null;
      return {
        filename: get(c, 'filename'),
        suffix: get(c, 'suffix'),
        original_text: get(c, 'original_text'),
        main_title: get(c, 'main_title'),
        subtitle: get(c, 'subtitle'),
        sub_sub_text: get(c, 'sub_sub_text'),
        button_text: get(c, 'button_text'),
        filename_suffix: get(c, 'filename_suffix'),
        logo: logo_base64,
        extra_instructions: get(c, 'extra'),
        position: 'tl',
        scale: 100
      };
    }));
    setTCsvData(rows);
    setLastSyncTime(new Date().toLocaleTimeString());
  };

        .replace('{{ERASE_LOGO_LINE}}', '')

  const handleTExportZip = async () => {
    if (!window.JSZip) { const s = document.createElement('script'); s.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"; document.head.appendChild(s); await new Promise(r => s.onload = r); }
    const zip = new window.JSZip(); let fileCount = 0;

    const content = await zip.generateAsync({ type: "blob" });

  const tMatchedCount = tBanners.filter(b => getTBannerLangs(b).length > 0).length;
  const tTotalLangs = tBanners.reduce((sum, b) => sum + getTBannerLangs(b).length, 0);

  const inputBaseClass = "w-full bg-black border border-white/10 px-2.5 py-2 text-[11px] rounded outline-none focus:border-[#3264ff] transition-all text-slate-300 font-normal";

        <div className="flex items-center gap-6">
          {!_lockedMode && (
            <>
              <div className="flex items-center gap-3">
                <Globe className="w-6 h-6 text-[#3264ff]" />
                <h1 className="text-xl font-black italic tracking-tighter text-white uppercase">BATCH TRANSLATOR</h1>
              </div>
              <div className="flex items-center bg-[#111217] rounded-md p-0.5 border border-white/5">
                <button onClick={() => setActiveTab('resize')} className={`px-4 py-1.5 text-[9px] font-black uppercase tracking-wide rounded-sm transition-all ${activeTab === 'resize' ? 'bg-[#3264ff] text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>
                  <span className="flex items-center gap-2"><Maximize className="w-3 h-3" /> RESIZE <span className="font-normal text-[8px] opacity-70">(1배너 → 다규격 · 다언어)</span></span>
                </button>
                <button onClick={() => setActiveTab('translate')} className={`px-4 py-1.5 text-[9px] font-black uppercase tracking-wide rounded-sm transition-all ${activeTab === 'translate' ? 'bg-[#3264ff] text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>

                </button>

        </div>
        <div className="flex items-center gap-3 text-left w-[320px]">

            <button onClick={activeTab === 'resize' ? handleExportZip : handleTExportZip} className="flex-1 flex justify-center items-center gap-2 py-2.5 bg-[#3264ff] text-white text-[11px] font-bold uppercase rounded-sm hover:brightness-110 shadow-lg shadow-[#3264ff]/20 transition-all"><Archive className="w-4 h-4"/> <span>EXPORT (.ZIP)</span></button>

                                        </div>

                                        <div className="relative">
                                            <textarea rows="1" value={lang.extra_instructions} onChange={e => updateLangField(lang.id, 'extra_instructions', e.target.value)} placeholder="추가 지시사항" className="w-full bg-[#111217] border border-[#1e2028] px-2.5 py-2 text-[10px] rounded outline-none focus:border-[#3264ff]/50 text-slate-400 resize-none transition-colors" />
                                            <span title="AI에 전달할 추가 프롬프트. 폰트 스타일, 색상 등 세부 지시를 넣을 수 있습니다." className="absolute top-2 right-2"><Info className="w-3 h-3 text-slate-600 cursor-help" /></span>
                                        </div>

                                        {/* 로고 */}
                                        <div className="pt-1.5 border-t border-white/5 space-y-2">
                                            <label className="text-[9px] font-bold text-slate-500 uppercase tracking-widest flex items-center gap-1.5"><LayoutTemplate className="w-3 h-3" /> 로고 <span title="생성된 배너에 합성할 로고. 위치와 크기를 조절할 수 있습니다."><Info className="w-3 h-3 text-slate-600 cursor-help" /></span></label>
                                            <div className="flex items-start gap-2.5">
                                                <div className="w-16 shrink-0">
                                                    <CompactSingleUploader label="" image={lang.logo} onUpload={(img) => updateLangField(lang.id, 'logo', img)} onDelete={() => updateLangField(lang.id, 'logo', null)} height="h-16" icon={LayoutTemplate} />
                                                </div>
                                                <div className="flex-1 flex flex-col gap-1.5">
                                                    <div className="grid grid-cols-4 gap-px">
                                                      {['tl','tr','bl','br'].map(p => (
                                                        <button key={p} onClick={() => updateLangField(lang.id, 'position', p)} className={`py-1 text-[7px] font-black rounded-sm transition-all ${lang.position === p ? 'bg-[#3264ff] text-white' : 'bg-[#111217] text-slate-600'} text-center`}><span>{p.toUpperCase()}</span></button>
                                                      ))}
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <input type="range" min="20" max="250" value={lang.scale} onChange={e => updateLangField(lang.id, 'scale', Number(e.target.value))} className="flex-1" />
                                                        <span className="text-[8px] font-bold text-slate-500 shrink-0 w-7 text-right">{lang.scale}%</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* 마스터 배너 — 썸네일로만 표시 (큰 결과는 아래 행에서) */}
                                        <div className="pt-2 border-t border-white/5 space-y-1.5">
                                            <label className="text-[9px] font-bold text-[#f59e0b] uppercase tracking-widest flex items-center gap-1.5"><Crown className="w-3 h-3" /> 마스터 배너 <span title="STEP 1에서 자동 생성되거나, 직접 업로드한 마스터가 나머지 규격 생성의 스타일 기준이 됩니다."><Info className="w-3 h-3 text-slate-600 cursor-help" /></span></label>
                                            <div className="flex items-center gap-2">
                                                {lang.master_style_image ? (
                                                    <div className="relative group w-16 h-16 shrink-0 rounded overflow-hidden border border-[#f59e0b]/30 bg-[#111217]">
                                                        <img src={lang.master_style_image} alt="마스터" className="w-full h-full object-cover" />
                                                        <button onClick={() => updateLangField(lang.id, 'master_style_image', null)} className="absolute inset-0 bg-black/70 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all"><X className="w-3 h-3 text-red-400" /></button>
                                                    </div>
                                                ) : (
                                                    <CompactSingleUploader label="" image={null} onUpload={(img) => updateLangField(lang.id, 'master_style_image', img)} onDelete={() => {}} icon={Crown} height="h-16" />
                                                )}
                                                <span className="text-[7px] text-slate-600 leading-tight">{lang.master_style_image ? 'STEP 1 결과 또는 직접 업로드' : '대기중'}</span>
                                            </div>
                                        </div>
                                    </div>
                                </th>
                            ))}
                            <th className="w-16 h-full relative group cursor-pointer text-center" onClick={addLanguage}>
                                <div className="absolute inset-y-0 left-0 w-px bg-white/5 group-hover:bg-[#3264ff]/50 transition-colors" />
                                <div className="h-full flex items-center justify-center text-center">
                                    <div className="w-9 h-9 bg-[#3264ff] text-white rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-transform opacity-80 group-hover:opacity-100"><Plus className="w-5 h-5" /></div>
                                </div>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        {sortedSourceBanners.map((banner, bIdx) => {
                            const isMaster = banner.id === masterBannerId;
                            return (
                            <tr key={banner.id} className="border-b border-white/5 hover:bg-white/[0.02] transition-colors group/row">
                                <td className={`p-4 align-top sticky left-0 z-30 ${isMaster ? 'bg-[#121c36] border-r-2 border-[#3264ff]/60' : 'bg-[#0a0d14] border-r-2 border-[#3264ff]/40 group-hover/row:bg-[#111622]'} shadow-[15px_0_30px_rgba(0,0,0,0.8)] transition-colors`}>
                                    {isMaster && <div className="absolute top-0 left-0 w-1 h-full bg-[#3264ff]" />}
                                    <div className="space-y-3 text-left">
                                        <div className="flex items-center gap-2.5">
                                          <span className="w-6 h-6 flex items-center justify-center bg-[#1a1c23] rounded-full text-[9px] font-black text-slate-500 text-center">{bIdx + 1}</span>
                                          <span className="text-[11px] font-black text-white italic uppercase tracking-tighter">{banner.w}x{banner.h}</span>
                                          {isMaster && <span className="bg-[#f59e0b] text-white text-[8px] px-1.5 py-0.5 rounded-sm inline-flex items-center gap-1 font-black uppercase shadow-lg shadow-[#f59e0b]/20"><Crown className="w-3 h-3"/> Master</span>}
                                        </div>
                                        <div className={`relative w-full rounded border overflow-hidden transition-all flex flex-col items-center justify-center ${isMaster ? 'border-[#f59e0b]/50 bg-black' : 'bg-black/40 border-white/5 shadow-inner group-hover/row:border-[#3264ff]/30'}`}>
                                            <img src={banner.src} className="max-w-full h-auto object-contain block transition-all" alt="s" />
                                        </div>
                                        <div className="flex items-center justify-between px-1 w-full">
                                            <div className="text-[8px] font-bold text-slate-500 uppercase truncate text-left flex-1">{banner.name}</div>
                                            {!isMaster && <button onClick={() => {setMasterBannerId(banner.id); setStyleReference(banner.src);}} className="text-[8px] font-bold text-slate-500 hover:text-[#3264ff] transition-colors">마스터 지정</button>}
                                        </div>
                                    </div>
                                </td>
                                {languages.map(lang => {
                                    const res = results?.[banner.id]?.[lang.id];
                                    return (
                                        <td key={lang.id} className="p-4 align-top border-r border-white/5 max-w-[600px]">
                                            <div className={`relative bg-[#090a0d] rounded border shadow-inner transition-all flex flex-col gap-2 ${res?.url || res?.loading ? 'p-2 shadow-2xl border-white/5' : 'p-3 min-h-[160px] bg-black/20 border-white/5'} ${isMaster ? 'ring-1 ring-[#f59e0b]/20' : ''}`}>
                                                {/* 상단: 마스터 배지 + 버튼 */}
                                                <div className="flex items-center justify-between px-1">
                                                    <div className="flex items-center gap-2">
                                                        {isMaster && <span className="bg-[#f59e0b] text-white text-[7px] px-1.5 py-0.5 rounded-sm inline-flex items-center gap-1 font-black uppercase"><Crown className="w-2.5 h-2.5"/> Master</span>}
                                                        <span className="text-[8px] font-bold text-slate-500 uppercase">{lang.suffix || ''}</span>
                                                    </div>
                                                    <div className="flex gap-1.5 shrink-0">
                                                        <button onClick={() => generateSingleResult(banner, lang, res?.prompt)} className="p-1 bg-white/5 rounded-sm hover:bg-white/10 text-slate-500 transition-all"><RotateCcw className="w-3 h-3"/></button>
                                                        {res?.url && (
                                                          <button onClick={() => { const a = document.createElement('a'); a.href = res.url; a.download = getOutputFileName(banner, lang); a.click(); }} className="p-1 bg-[#3264ff]/10 rounded-sm text-[#3264ff] hover:bg-[#3264ff] hover:text-white transition-all"><Download className="w-3 h-3" /></button>
                                                        )}
                                                    </div>
                                                </div>
                                                {/* 로고 사이즈 — 결과 있을 때만 */}
                                                {res?.url && (
                                                <div className="flex items-center gap-2 px-1">
                                                    <span className="text-[7px] font-black text-slate-600 uppercase tracking-widest shrink-0">로고 사이즈</span>
                                                    <input type="range" min="10" max="250" value={res.scale || 100} onChange={e => updateLogoResult(banner.id, lang.id, Number(e.target.value))} className="w-24" />
                                                    <span className="text-[7px] font-black text-[#3264ff] shrink-0">{res.scale || 100}%</span>
                                                </div>
                                                )}
                                                <div className="relative flex flex-col gap-3 pb-1 w-full">
                                                    {res?.url && (
                                                        <div className="relative group/img w-full animate-fade-in flex justify-center bg-black/20 rounded border border-white/5">
                                                            <img src={res.url} className="max-w-full h-auto object-contain block" alt="Output" />
                                                            <button onClick={() => { const a = document.createElement('a'); a.href = res.url; a.download = getOutputFileName(banner, lang); a.click(); }} className="absolute top-2 right-2 p-1.5 bg-black/60 text-white rounded hover:bg-[#3264ff] opacity-0 group-hover/img:opacity-100 transition-all"><Download className="w-3 h-3" /></button>
                                                        </div>
                                                    )}
                                                    {res?.loading && (
                                                      <div className="flex flex-col items-center justify-center w-full min-h-[160px] gap-2 animate-pulse text-center bg-white/[0.02] rounded border border-dashed border-white/10">
                                                        <Loader2 className="w-5 h-5 text-[#3264ff] animate-spin" />
                                                        <span className="text-[7px] font-black text-[#3264ff] tracking-[0.1em] uppercase">RENDERING...</span>
                                                      </div>
                                                    )}
                                                    {(!res?.loading && res?.error && !res?.url) && (
                                                      <div className="flex items-center justify-center w-full min-h-[160px]">
                                                        <div className="text-red-500 text-[9px] font-bold text-center px-2 leading-tight bg-red-950/30 p-2 rounded border border-red-500/30">{res.error}</div>
                                                      </div>
                                                    )}
                                                    {(!res?.loading && !res?.url && !res?.error) && (() => {
                                                      const masterImg = isMaster ? lang.master_style_image : null;
                                                      return masterImg ? (
                                                        <div className="relative w-full rounded border border-[#f59e0b]/50 overflow-hidden bg-black">
                                                          <img src={masterImg} className="w-full h-auto object-contain block" alt="master" />
                                                        </div>
                                                      ) : (
                                                        <div className="flex items-center justify-center w-full min-h-[160px]"><Zap className="w-7 h-7 opacity-5" /></div>
                                                      );
                                                    })()}
                                                </div>
                                                {res?.url && (
                                                    <div className="mt-1 px-1">
                                                        <div className="flex gap-1.5 items-center bg-black/40 p-1.5 rounded-sm border border-white/5 focus-within:border-[#3264ff]/40 transition-all">
                                                            <MessageSquareText className="w-3.5 h-3.5 text-slate-700 ml-0.5 shrink-0" />
                                                            <input type="text" value={res.prompt || ''} onChange={e => setResults(prev => ({...prev, [banner.id]: {...prev[banner.id], [lang.id]: {...res, prompt: e.target.value}}}))} onKeyDown={e => e.key === 'Enter' && generateSingleResult(banner, lang, res.prompt)} placeholder="Prompt..." className="flex-1 bg-transparent text-[9px] text-slate-300 outline-none" />
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </td>
                                    );
                                })}
                                <td className="bg-white/[0.01]" />
                            </tr>
                            );
                        })}
                    </tbody>
                </table>
                {sourceBanners.length === 0 && (
                  <div className="h-[40vh] flex flex-col items-center justify-center text-slate-800 gap-4 italic font-black uppercase tracking-widest text-center opacity-30">
                    <ImageIcon className="w-14 h-14 mb-2" />
                    <span>Awaiting Source Banners</span>
                  </div>
                )}
            </div>
          ) : (
            /* ── TRANSLATE 메인 영역 ── */
            <div className="flex-1 overflow-auto custom-scrollbar p-6">
              {tBanners.length === 0 ? (
                <div className="h-[40vh] flex flex-col items-center justify-center text-slate-800 gap-4 italic font-black uppercase tracking-widest text-center opacity-30">
                  <Languages className="w-14 h-14 mb-2" />
                  <span>Upload Banners & CSV</span>
                </div>
              ) : (
                <div className="flex flex-col gap-4">
                  {tBanners.map(banner => {
                    const langs = getTBannerLangs(banner);
                    const hasMatch = langs.length > 0;
                    return (
                      <div key={banner.id} className={`bg-[#111217] rounded-lg border animate-fade-in ${hasMatch ? 'border-[#3264ff]/20' : 'border-white/5'}`}>
                        <div className="flex items-stretch gap-4 p-4">
                          {/* 좌측: 원본 배너 썸네일 */}
                          <div className="w-48 shrink-0 flex flex-col gap-2">
                            <div className="text-[10px] font-black text-white truncate">{banner.name}</div>
                            <div className="text-[9px] text-slate-500">{banner.w}×{banner.h}</div>
                            <div className="w-full aspect-square rounded bg-black overflow-hidden border border-white/5">
                              <img src={banner.src} className="w-full h-full object-contain" alt={banner.name} />
                            </div>
                            <div className="flex gap-1 flex-wrap">
                              {hasMatch ? langs.map(l => {
                                const key = `${banner.id}_${l.suffix}`;
                                const res = tResults[key];
                                return (
                                  <span key={l.suffix} className={`text-[8px] px-1.5 py-0.5 rounded font-bold uppercase ${res?.url ? 'bg-green-500/20 text-green-400' : res?.loading ? 'bg-[#3264ff]/20 text-[#3264ff] animate-pulse' : 'bg-[#3264ff]/10 text-[#3264ff]'}`}>{l.suffix}</span>
                                );
                              }) : (
                                <span className="text-[8px] text-slate-600 font-bold">CSV 미매칭</span>
                              )}
                            </div>
                            <button onClick={() => setTBanners(prev => prev.filter(b => b.id !== banner.id))} className="mt-auto self-start p-1 text-slate-700 hover:text-red-400 transition-colors"><Trash2 className="w-3.5 h-3.5" /></button>
                          </div>
                          {/* 우측: 모든 언어 패널 가로 나열 */}
                          <div className="flex-1 min-w-0">
                            {langs.length > 0 ? (
                              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-3">
                                {langs.map(langRow => {
                                  const key = `${banner.id}_${langRow.suffix}`;
                                  const res = tResults[key];
                                  return (
                                    <div key={langRow.suffix} className="bg-[#090a0d] rounded-lg p-3 border border-white/5 space-y-3">
                                      <div className="flex items-center justify-between">
                                        <span className="text-[11px] font-black text-[#3264ff] uppercase tracking-tight">{langRow.suffix}</span>
                                        <div className="flex gap-1.5">
                                          <button onClick={() => generateTSingle(banner, langRow)} disabled={isGenerating} className="p-1 bg-white/5 rounded-sm hover:bg-white/10 text-slate-500 transition-all disabled:opacity-30"><RotateCcw className="w-3 h-3" /></button>
                                          {res?.url && <button onClick={() => { const a = document.createElement('a'); a.href = res.url; a.download = `${banner.w}x${banner.h}_${langRow.filename_suffix || langRow.suffix}.jpg`; a.click(); }} className="p-1 bg-[#3264ff]/10 rounded-sm text-[#3264ff] hover:bg-[#3264ff] hover:text-white transition-all"><Download className="w-3 h-3" /></button>}
                                        </div>
                                      </div>
                                      <div className="space-y-1 text-[9px]">
                                        {langRow.original_text && <div className="flex gap-2"><span className="text-slate-600 shrink-0 w-12">지울텍스트</span><span className="text-red-400/70 truncate">{langRow.original_text}</span></div>}
                                        {langRow.main_title && <div className="flex gap-2"><span className="text-slate-600 shrink-0 w-12">타이틀</span><span className="text-slate-300 truncate">{langRow.main_title}</span></div>}
                                        {langRow.subtitle && <div className="flex gap-2"><span className="text-slate-600 shrink-0 w-12">서브</span><span className="text-slate-400 truncate">{langRow.subtitle}</span></div>}
                                        {langRow.button_text && <div className="flex gap-2"><span className="text-slate-600 shrink-0 w-12">버튼</span><span className="text-slate-400 truncate">{langRow.button_text}</span></div>}
                                        {langRow.extra_instructions && <div className="flex gap-2"><span className="text-slate-600 shrink-0 w-12">추가지시</span><span className="text-slate-500 truncate">{langRow.extra_instructions}</span></div>}
                                      </div>
                                      {res?.url && (
                                        <div className="relative group/img rounded overflow-hidden border border-white/5 bg-black/20">
                                          <img src={res.url} className="w-full h-auto object-contain" alt="result" />
                                          <button onClick={() => { const a = document.createElement('a'); a.href = res.url; a.download = `${banner.w}x${banner.h}_${langRow.filename_suffix || langRow.suffix}.jpg`; a.click(); }} className="absolute top-2 right-2 p-1.5 bg-black/60 text-white rounded hover:bg-[#3264ff] opacity-0 group-hover/img:opacity-100 transition-all"><Download className="w-3 h-3" /></button>
                                        </div>
                                      )}
                                      {res?.loading && (
                                        <div className="flex flex-col items-center justify-center py-8 gap-2 animate-pulse bg-white/[0.02] rounded border border-dashed border-white/10">
                                          <Loader2 className="w-5 h-5 text-[#3264ff] animate-spin" />
                                          <span className="text-[7px] font-black text-[#3264ff] tracking-[0.1em] uppercase">RENDERING...</span>
                                        </div>
                                      )}
                                      {res?.error && <div className="text-red-500 text-[9px] bg-red-950/30 p-2 rounded border border-red-500/30">{res.error}</div>}
                                      {!res && <div className="flex items-center justify-center py-6 opacity-10"><Zap className="w-6 h-6" /></div>}
                                    </div>
                                  );
                                })}
                              </div>
                            ) : (
                              <div className="h-full flex items-center justify-center text-slate-600 text-[10px]">CSV에 "<span className="text-white font-bold mx-1">{banner.name.replace(/\.[^.]+$/, '')}</span>" 파일명과 매칭되는 데이터가 없습니다.</div>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script>
  // PROMO STUDIO iframe 환경 감지 → in-studio 클래스 부여
  if (window.self !== window.top) {
    document.documentElement.classList.add('in-studio');
  }
  </script>
</body>
</html>
